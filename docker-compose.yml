networks:
  analytics:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  clickhouse-data:
  zookeeper-data:
  minio-data:
  fluss-data:
  paimon-warehouse:

services:

  # ── Confluent Kafka (KRaft, single-node) ────────────────────────────────────

  broker:
    image: confluentinc/cp-kafka:7.9.0
    hostname: broker
    container_name: broker
    networks: [analytics]
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      TZ: UTC
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_LOG_RETENTION_HOURS: 24
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ── Schema Registry ─────────────────────────────────────────────────────────

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.0
    hostname: schema-registry
    container_name: schema-registry
    networks: [analytics]
    depends_on:
      broker:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      TZ: UTC
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'broker:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ── Topic initialization (one-shot) ─────────────────────────────────────────

  kafka-init:
    image: confluentinc/cp-kafka:7.9.0
    container_name: kafka-init
    networks: [analytics]
    depends_on:
      broker:
        condition: service_healthy
    environment:
      TZ: UTC
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --create --if-not-exists \
          --bootstrap-server broker:29092 \
          --topic transactions \
          --partitions 12 \
          --replication-factor 1 \
          --config retention.ms=86400000 \
          --config segment.bytes=536870912
        kafka-topics --describe --bootstrap-server broker:29092 --topic transactions
    restart: "no"

  # ── Kafka UI ─────────────────────────────────────────────────────────────────

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    networks: [analytics]
    ports:
      - "8090:8080"
    depends_on:
      broker:
        condition: service_healthy
    environment:
      TZ: UTC
      KAFKA_CLUSTERS_0_NAME: analytics-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      DYNAMIC_CONFIG_ENABLED: "true"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ── Kafka Exporter ───────────────────────────────────────────────────────────

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    networks: [analytics]
    ports:
      - "9308:9308"
    environment:
      TZ: UTC
    command:
      - --kafka.server=broker:29092
      - --web.listen-address=:9308
      - --topic.filter=transactions
    depends_on:
      broker:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks: [analytics]
    ports:
      - "9090:9090"
    environment:
      TZ: UTC
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks: [analytics]
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - TZ=UTC
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on: [prometheus]
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped

  # ── ClickHouse (Pattern 1) ──────────────────────────────────────────────────

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    networks: [analytics]
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      TZ: UTC
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ./docker/clickhouse/config:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Data Generator ──────────────────────────────────────────────────────────

  generator:
    build:
      context: ./docker/generator
      dockerfile: Dockerfile
    container_name: generator
    networks: [analytics]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      TZ: UTC
      KAFKA_BROKERS: broker:29092
      TOPIC: transactions
      TARGET_RPS: "10000"
      NUM_THREADS: "4"
      ACKS: "1"
      COMPRESSION: "lz4"
      LINGER_MS: "5"
      BATCH_SIZE: "131072"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # ── Phase 3: ZooKeeper ───────────────────────────────────────────────────────

  zookeeper:
    image: zookeeper:3.9.2
    container_name: zookeeper
    networks: [analytics]
    environment:
      TZ: UTC
      ZOO_MY_ID: 1
      ZOO_TICK_TIME: 4000
      ZOO_CFG_EXTRA: "maxSessionTimeout=120000"
    volumes:
      - zookeeper-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat /dev/null > /dev/tcp/localhost/2181' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ── Phase 3: MinIO ───────────────────────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: minio
    networks: [analytics]
    ports:
      - "9001:9001"
    environment:
      TZ: UTC
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --address ":9000" --console-address ":9001"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    networks: [analytics]
    environment:
      TZ: UTC
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/fluss
        echo "MinIO bucket 'fluss' ready."
    restart: "no"

  # ── Phase 3: Paimon warehouse ownership fix ──────────────────────────────────
  # Flink JVM runs as uid 9999 (flink); ensure the shared paimon-warehouse volume
  # is writable by that user before the tiering job starts.

  paimon-init:
    image: busybox:latest
    container_name: paimon-init
    networks: [analytics]
    volumes:
      - paimon-warehouse:/tmp/paimon/warehouse
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /tmp/paimon/warehouse
        chown -R 9999:9999 /tmp/paimon/warehouse
        echo "paimon-warehouse ownership set to flink (9999)."
    restart: "no"

  # ── Phase 3: Fluss — CoordinatorServer ───────────────────────────────────────

  coordinator-server:
    image: apache/fluss:0.9.1-incubating
    container_name: coordinator-server
    networks: [analytics]
    ports:
      - "9123:9123"
    command: coordinatorServer
    environment:
      TZ: UTC
      FLUSS_PROPERTIES: |
        zookeeper.address: zookeeper:2181
        zookeeper.session.timeout: 90000
        bind.listeners: FLUSS://coordinator-server:9123
        remote.data.dir: s3://fluss/remote-data
        s3.endpoint: http://minio:9000
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        s3.path-style-access: true
        s3.region: us-east-1
        s3.assumed.role.arn: arn:aws:iam::000000000000:role/minioadmin
        s3.assumed.role.sts.endpoint: http://minio:9000
        datalake.format: paimon
        datalake.paimon.metastore: filesystem
        datalake.paimon.warehouse: /tmp/paimon/warehouse
    volumes:
      - paimon-warehouse:/tmp/paimon/warehouse
    depends_on:
      zookeeper:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'IP=$$(hostname -i); cat /dev/null > /dev/tcp/$$IP/9123' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ── Phase 3: Fluss — TabletServer ────────────────────────────────────────────

  tablet-server:
    image: apache/fluss:0.9.1-incubating
    container_name: tablet-server
    networks: [analytics]
    command: tabletServer
    environment:
      TZ: UTC
      FLUSS_PROPERTIES: |
        zookeeper.address: zookeeper:2181
        zookeeper.session.timeout: 90000
        bind.listeners: FLUSS://tablet-server:9123
        tablet-server.id: 1
        data.dir: /tmp/fluss/data
        remote.data.dir: s3://fluss/remote-data
        s3.endpoint: http://minio:9000
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        s3.path-style-access: true
        s3.region: us-east-1
        s3.assumed.role.arn: arn:aws:iam::000000000000:role/minioadmin
        s3.assumed.role.sts.endpoint: http://minio:9000
        datalake.format: paimon
        datalake.paimon.metastore: filesystem
        datalake.paimon.warehouse: /tmp/paimon/warehouse
    volumes:
      - fluss-data:/tmp/fluss
      - paimon-warehouse:/tmp/paimon/warehouse
    depends_on:
      coordinator-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
    restart: unless-stopped

  # ── Phase 3: Flink — JobManager ──────────────────────────────────────────────

  flink-jobmanager:
    build:
      context: ./docker/flink
      dockerfile: Dockerfile
    container_name: flink-jobmanager
    networks: [analytics]
    ports:
      - "8082:8081"   # Flink REST API (job mgmt, JAR upload/run)
      - "8083:8083"   # SQL Gateway REST API (SQL statement submission)
    entrypoint: ["/entrypoint.sh"]
    environment:
      - TZ=UTC
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 8
        parallelism.default: 2
        heartbeat.interval: 1000
        heartbeat.timeout: 300000
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        rest.flamegraph.enabled: true
        classloader.check-leaked-classloader: false
        sql-gateway.endpoint.rest.address: 0.0.0.0
        sql-gateway.endpoint.rest.port: 8083
        s3.endpoint: http://minio:9000
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        s3.path-style-access: true
        s3.region: us-east-1
        s3.assumed.role.arn: arn:aws:iam::000000000000:role/minioadmin
        s3.assumed.role.sts.endpoint: http://minio:9000
    volumes:
      - ./docker/flink/sql:/sql
      - paimon-warehouse:/tmp/paimon/warehouse
    depends_on:
      coordinator-server:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview && curl -sf http://localhost:8083/v1/info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

  # ── Phase 3: Flink — TaskManager ─────────────────────────────────────────────

  flink-taskmanager:
    build:
      context: ./docker/flink
      dockerfile: Dockerfile
    networks: [analytics]
    command: taskmanager
    environment:
      - TZ=UTC
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 8
        taskmanager.memory.process.size: 3500m
        classloader.check-leaked-classloader: false
        heartbeat.interval: 1000
        heartbeat.timeout: 300000
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        s3.endpoint: http://minio:9000
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        s3.path-style-access: true
        s3.region: us-east-1
        s3.assumed.role.arn: arn:aws:iam::000000000000:role/minioadmin
        s3.assumed.role.sts.endpoint: http://minio:9000
    volumes:
      - paimon-warehouse:/tmp/paimon/warehouse
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    restart: unless-stopped

