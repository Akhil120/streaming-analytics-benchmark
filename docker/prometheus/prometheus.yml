global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: analytics-local

scrape_configs:

  - job_name: kafka-exporter
    static_configs:
      - targets: ['kafka-exporter:9308']
        labels:
          component: kafka

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
